<!doctype html>
<html>
<head><style>
body { margin: 0; background: transparent; }
button { width: 32px; height: 32px; background: #4a90d9; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; color: white; }
button:hover { background: #3a7fc8; }
#menu { display: none; position: fixed; background: #1e1e1e; border: 1px solid #333; border-radius: 8px; padding: 6px 0; min-width: 160px; box-shadow: 0 4px 16px rgba(0,0,0,0.4); z-index: 99999; }
#menu.show { display: block; }
.menu-item { padding: 8px 16px; color: #e0e0e0; font-size: 13px; cursor: pointer; }
.menu-item:hover { background: #2a2a2a; }
.menu-item.danger { color: #e06060; }
.menu-sep { height: 1px; background: #333; margin: 4px 0; }
</style></head>
<body><button id="btn">P</button>
<div id="menu">
  <div class="menu-item" id="mi-hide">Hide Prompt Button</div>
  <div class="menu-sep"></div>
  <div class="menu-item" id="mi-open">Open Prompt Picker</div>
</div>
<script type="module">
const btn = document.getElementById('btn');
const tauri = window.__TAURI__;
let start = null;
let dragging = false;
let lastMove = null;
let animationFrame = 0;

function distance(a, b) {
  return Math.hypot(a.screenX - b.screenX, a.screenY - b.screenY);
}

async function flushMove() {
  animationFrame = 0;
  if (!lastMove || !start) return;
  await tauri.core.invoke('move_prompt_button_to', {
    x: start.windowX + lastMove.screenX - start.screenX,
    y: start.windowY + lastMove.screenY - start.screenY
  });
}

btn.addEventListener('pointerdown', async (event) => {
  const position = await tauri.core.invoke('prompt_button_position_cmd');
  if (!position) return;
  start = {
    screenX: event.screenX,
    screenY: event.screenY,
    windowX: position.x,
    windowY: position.y
  };
  dragging = false;
  lastMove = null;
  btn.setPointerCapture(event.pointerId);
});

btn.addEventListener('pointermove', (event) => {
  if (!start) return;
  const current = { screenX: event.screenX, screenY: event.screenY };
  if (!dragging && distance(start, current) < 4) return;
  dragging = true;
  lastMove = current;
  if (!animationFrame) {
    animationFrame = requestAnimationFrame(flushMove);
  }
});

btn.addEventListener('pointerup', async (event) => {
  if (!start) return;
  btn.releasePointerCapture(event.pointerId);
  if (dragging) {
    const position = await tauri.core.invoke('prompt_button_position_cmd');
    if (tauri.event?.emit && position) {
      await tauri.event.emit('prompt-button-drag-ended', position);
    }
  } else {
    await tauri.core.invoke('show_prompt_popover_from_button');
  }
  start = null;
  dragging = false;
  lastMove = null;
});

// Right-click context menu
const menu = document.getElementById('menu');
btn.addEventListener('contextmenu', (event) => {
  event.preventDefault();
  menu.style.left = `${event.clientX}px`;
  menu.style.top = `${event.clientY}px`;
  menu.classList.add('show');
});

document.addEventListener('click', () => {
  menu.classList.remove('show');
});

document.getElementById('mi-hide').addEventListener('click', async () => {
  menu.classList.remove('show');
  await tauri.core.invoke('hide_prompt_button');
});

document.getElementById('mi-open').addEventListener('click', async () => {
  menu.classList.remove('show');
  await tauri.core.invoke('open_main_window');
});
</script>
</body>
</html>
